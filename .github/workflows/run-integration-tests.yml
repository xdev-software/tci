name: Run integration tests

on:
  workflow_dispatch:
  push:
    branches: [ develop ]
    paths-ignore: 
      - '**.md'
      - '.config/**'
      - '.github/**'
      - '.idea/**'
      - 'assets/**'
  pull_request:
    branches: [ develop ]
    paths-ignore: 
      - '**.md'
      - '.config/**'
      - '.github/**'
      - '.idea/**'
      - 'assets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  persistence:
    strategy:
      fail-fast: false
      matrix:
        project: [persistence-it-hibernate]
        parallel: [0, 2]
        pre-start: [false, true]
        java: [21]
        include:
          - project: persistence-it-eclipselink
            parallel: 2
            pre-start: true
            java: 21
    name: "persistence (${{matrix.project}}, ${{matrix.parallel}}, ${{matrix.pre-start}}, ${{matrix.java}})"
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/')) }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ matrix.java }}

    - name: Cache Maven
      uses: actions/cache@v6
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-mvn-it-build-persistence-${{ matrix.project }}-${{ hashFiles('**/pom.xml') }}

    - name: Test
      run: |
        ./mvnw -B test \
        -pl "advanced-demo/integration-tests/${{ matrix.project }}" -am \
        -P run-it \
        ${{ matrix.pre-start && '-Dinfra-pre-start.enabled=1 ' || '' }} \
        ${{ matrix.parallel > 0 && format('-Djunit.jupiter.execution.parallel.enabled=true -Djunit.jupiter.execution.parallel.mode.default=concurrent -Djunit.jupiter.execution.parallel.mode.classes.default=concurrent -Djunit.jupiter.execution.parallel.config.strategy=fixed -Djunit.jupiter.execution.parallel.config.fixed.parallelism=2 -Djunit.jupiter.execution.parallel.config.fixed.max-pool-size={0} ', matrix.parallel) || '' }}

  selenium:
    strategy:
      fail-fast: false
      matrix:
        project: [webapp-it]
        parallel: [0, 2]
        pre-start: [false, true]
        native-image-build: [true]
        java: [21]
        include:
          - project: webapp-it
            parallel: 2
            pre-start: true
            native-image-build: false
            java: 21
    name: "selenium (${{matrix.project}}, ${{matrix.parallel}}, ${{matrix.pre-start}}, ${{matrix.java}})"
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/')) }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ matrix.java }}

    - name: Cache Maven
      uses: actions/cache@v6
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-mvn-it-build-selenium-${{ matrix.project }}-${{ matrix.native-image-build }}-${{ hashFiles('**/pom.xml') }}

    - name: Build webapp
      if: ${{ matrix.native-image-build }}
      run: |
        ./mvnw -B package -pl advanced-demo/webapp -am -Pprod,dev-log -T2C -Dmaven.test.skip

    - name: Setup QEMU
      if: ${{ matrix.native-image-build }}
      uses: docker/setup-qemu-action@v4

    - name: Setup buildx
      if: ${{ matrix.native-image-build }}
      uses: docker/setup-buildx-action@v4

    - name: Build webapp docker image
      if: ${{ matrix.native-image-build }}
      uses: docker/build-push-action@v7
      with:
        context: advanced-demo/webapp
        build-args: |
          JACOCO_AGENT_ENABLED=1
        push: false
        load: true
        tags: webapp
        cache-from: type=gha,scope=webapp-it
        cache-to: type=gha,mode=max,scope=webapp-it

    - name: Test
      run: |
        ./mvnw -B test \
        -pl "advanced-demo/integration-tests/${{ matrix.project }}" -am \
        -P run-it,jacoco \
        ${{ matrix.native-image-build && '-DappDockerImage=webapp' || '' }} \
        ${{ matrix.pre-start && '-Dinfra-pre-start.enabled=1 ' || '' }} \
        ${{ matrix.parallel > 0 && format('-Djunit.jupiter.execution.parallel.enabled=true -Djunit.jupiter.execution.parallel.mode.default=concurrent -Djunit.jupiter.execution.parallel.mode.classes.default=concurrent -Djunit.jupiter.execution.parallel.config.strategy=fixed -Djunit.jupiter.execution.parallel.config.fixed.parallelism=2 -Djunit.jupiter.execution.parallel.config.fixed.max-pool-size={0} ', matrix.parallel) || '' }}

    # Replace '/' with '-'
    - name: Normalize project name
      if: ${{ !cancelled() }}
      env:
        PROJECT: ${{ matrix.project }}
      run: echo PROJECT_NORMALIZED=${PROJECT/\//-} >> $GITHUB_ENV

    - name: Upload videos of test failures
      if: ${{ failure() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-fail-videos-${{ matrix.java }}-${{ env.PROJECT_NORMALIZED }}-${{ matrix.parallel }}-${{ matrix.pre-start }}
        path: advanced-demo/integration-tests/${{ matrix.project }}/target/records
        if-no-files-found: ignore

    - name: Aggregate WebApp JaCoCo report
      if: ${{ success() }}
      # Important: Also run compile (if not already done) so that we have all class files - otherwise the report will be incomplete
      run: |
        ./mvnw -B compile jacoco-aggregator:report-aggregate-all -pl "advanced-demo/webapp" -am -T2C

    - name: Upload WebApp JaCoCo report
      if: ${{ success() }}
      uses: actions/upload-artifact@v7
      with:
        name: webapp-jacoco-report-${{ matrix.java }}-${{ env.PROJECT_NORMALIZED }}-${{ matrix.parallel }}-${{ matrix.pre-start }}
        path: advanced-demo/target/site/jacoco-aggregate
        if-no-files-found: ignore
