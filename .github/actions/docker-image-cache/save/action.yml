name: 'Save docker image cache'
description: 'Save the docker image cache'
# Based on https://github.com/actions/cache/blob/v6/restore/action.yml
inputs:
  key:
    description: 'An explicit key for restoring the cache'
    required: true
  cache-hit:
    description: 'A boolean value to indicate an exact match was found for the primary key'
    required: false
runs:
  using: "composite"
  steps:
    - name: Create docker image cache
      # Cache can't be saved when it's already present
      if: inputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "Images before pruning" && docker image ls
        docker image prune -af --filter "until=2160h"
        docker image prune -f
        echo "Currently available images" && docker image ls

        echo "Will NOT cache images" && docker image ls ${CI_CACHE_DOCKER_SAVE_IGNORE_FILTERS:--f="label=org.testcontainers.sessionId"}

        mkdir -p ~/.cache/docker
        image_ids_to_save=$(comm -23 <(docker images -q | sort) <(docker image ls -q ${CI_CACHE_DOCKER_SAVE_IGNORE_FILTERS:--f="label=org.testcontainers.sessionId"} | sort))
        echo "Saving image ids" && echo $image_ids_to_save
        docker save $image_ids_to_save -o ~/.cache/docker/images.tar

        ls -lha ~/.cache/docker

    - name: Save docker image cache
      if: inputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/docker/
        key: ${{ inputs.key }}
